<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QueueSmart Tutor - My History</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* Stats cards grid layout */
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* individual stat card style */
        .stat-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, #f8fafc 100%);
            padding: 1.5rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease; 
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        /* large number display */
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
            line-height: 1.2; 
        }

        /* label below the number */
        .stat-label {
            color: var(--color-placeholder);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
    </style>
    <style>
        /* Filter bar container */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
            background: var(--color-primary);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--color-border);
        }

        /* filter input styling */
        .filter-select, .filter-input {
            padding: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            min-width: 200px;
            background: var(--color-primary);
            transition: border-color 0.2s;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Filter button styling */
        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: var(--color-accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .filter-btn:hover {
            background: #1d4ed8;
        }

        /* Reset button styling */
        .filter-btn.reset {
            background: var(--color-placeholder);
        }

        .filter-btn.reset:hover {
            background: #4b5563;
        }

        /* Clear history button (admin only) */
        .clear-history-btn {
            background: var(--color-danger);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            margin-left: auto;
            transition: background 0.2s;
        }

        .clear-history-btn:hover {
            background: #dc2626;
        }
    </style>
    <style>
        /* Table container for horizontal scroll on mobile */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius);
        }

        /* History table styling */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-primary);
        }

        /* Table header styling */
        .history-table th {
            background: #f8fafc;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--color-placeholder);
            border-bottom: 2px solid var(--color-border);
        }

        /* Table cell styling */
        .history-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--color-border);
        }

        /* Status badge styling */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: capitalize;
        }

        /* Status-specific colors */
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-served { background: #dbeafe; color: #1e40af; }
        .status-left { background: #fee2e2; color: #b91c1c; }

        /* Wait time styling */
        .wait-time {
            font-weight: 600;
            color: var(--color-accent);
        }

        /* Empty state styling */
        .no-history {
            text-align: center;
            padding: 4rem;
            color: var(--color-placeholder);
            background: #f8fafc;
            border-radius: var(--radius);
            font-size: 1.1rem;
        }
  
        /* Row hover effect */
        .history-table tbody tr:hover {
            background: #f8fafc;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">QueueSmart Tutor</div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="join-queue.html" class="nav-link">Join Queue</a>
            <a href="queue-status.html" class="nav-link">My Queue</a>
            <a href="user-history.html" class="nav-link" style="color: var(--color-accent); font-weight: 700;">History</a>            
        </nav>
        <div class="user-section">
            <span id="user-email"></span>
            <span id="role-badge" class="role-badge"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div class="container-full">
        <h1>My Queue History</h1>
        
        <!-- Statistics Cards -->
        <!-- Total visits card -->
        <div class="stat-card">
            <div class="stat-value" id="total-visits">0</div>
            <div class="stat-label">Total Visits</div>
        </div>

        <!-- Average wait time card -->
        <div class="stat-card">
            <div class="stat-value" id="avg-wait">0</div>
            <div class="stat-label">Avg. Wait (min)</div>
        </div>

        <!-- Completed visits card -->
         <div class="stat-card">
            <div class="stat-value" id="completed-visits">0</div>
            <div class="stat-label">Completed</div>
         </div>

        <!-- Left early card -->
        <div class="stat-card">
            <div class="stat-value" id="left-early">0</div>
            <div class="stat-label">Left Early</div>
        </div>

        <!-- Filters -->
        <div class="card">
            <div class="card-title">
                History Filters
                <button onclick="clearFilters()" class="filter-btn reset">Reset Filters</button>
            </div>
            <div class="filter-bar">
                <!-- Status filter dropdown -->
                <select id="status-filter" class="filter-select">
                    <option value="">All Statuses</option>
                    <option value="completed">Completed</option>
                    <option value="served">Served</option>
                    <option value="left">Left Early</option>
                </select>
    
                <!-- Service filter dropdown (populated dynamically) -->
                <select id="service-filter" class="filter-select">
                    <option value="">All Services</option>
                </select>
    
                <!-- Date range filters -->
                <input type="date" id="date-from" class="filter-input" placeholder="From Date">
                <input type="date" id="date-to" class="filter-input" placeholder="To Date">
    
                <!-- Apply filters button -->
                <button onclick="applyFilters()" class="filter-btn">Apply Filters</button>
    
                <!-- Admin clear history button (hidden by default) -->
                <button onclick="clearAllHistory()" class="clear-history-btn" id="clear-history-btn" style="display: none;">Clear All History</button>
        </div>

        <div class="card">
            <div class="card-title">Queue History</div>
            <div class="table-container">
                <table class="history-table" id="history-table">
                <thead>
                    <tr>
                    <th>Date</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Wait Time</th>
                    <th>Joined</th>
                    <th>Completed</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Loading state -->
                    <tr>
                    <td colspan="6" class="no-history">Loading history...</td>
                    </tr>
                </tbody>
                </table>
            </div>
        </div>       
        
    </div>

    <script src="script.js"></script>
    <script>
        // Basic authentication check
        document.addEventListener('DOMContentLoaded', function() {
            // Verify user is logged in, redirect to login if not
            const user = checkAuth();
            if (!user) return;

            // Display user information in header
            document.getElementById('user-email').textContent = user.email;

            // Set role badge with appropriate styling
            const badge = document.getElementById('role-badge');
            badge.textContent = user.role === 'admin' ? 'ADMIN' : 'STUDENT';
            badge.className = `role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}`;

            //Populate service filter dropdown with available services
            const serviceFilter = document.getElementById('service-filter');

            // Loop through all services from global services array
            services.forEach(service => {
                const option = document.createElement('option');
                option.value = service.id;  // Store service ID as value
                option.textContent = service.name; // Display service name
                serviceFilter.appendChild(option);
            });

            //Set default date range (last 30 days)
            const today = new Date();
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(today.getDate() - 30);

            // Populate date inputs with default values
            document.getElementById('date-to').valueAsDate = today;
            document.getElementById('date-from').valueAsDate = thirtyDaysAgo;
        });

        function loadHistory(user) {
            // Get user's complete history from script.js function
            const history = getUserHistory(user.email);

            // Get current filter values
            const filters = getCurrentFilters();

            //Apply filters to history data
            const filteredHistory = applyFiltersToHistory(history, filters);

            //Update statistics cards with filtered data
            updateStats(history, filteredHistory);        
        }

        function getCurrentFilters() {
            return {
                status: document.getElementById('status-filter').value,
                serviceId: document.getElementById('service-filter').value ? 
                    parseInt(document.getElementById('service-filter').value) : null,
                startDate: document.getElementById('date-from').value,
                endDate: document.getElementById('date-to').value
            };
        }

        function applyFiltersToHistory(history, filters) {
            return history.filter(entry => {
                // Filter by status if selected
                if (filters.status && entry.status !== filters.status) return false;
                
                // Filter by service if selected
                if (filters.serviceId && entry.serviceId !== filters.serviceId) return false;
                
                // Filter by start date if selected
                if (filters.startDate && new Date(entry.completedAt) < new Date(filters.startDate)) return false;
                
                // Filter by end date if selected (include entire day)
                if (filters.endDate) {
                    const endDate = new Date(filters.endDate);
                    endDate.setHours(23, 59, 59); // End of the selected day
                    if (new Date(entry.completedAt) > endDate) return false;
                }
            
            return true; // Entry passed all filters
            });
        }

        function updateStats(allHistory, filteredHistory) {
            // Calculate metrics from filtered history
            const totalVisits = filteredHistory.length;
            const completedVisits = filteredHistory.filter(h => 
                h.status === 'completed' || h.status === 'served'
            ).length;
            const leftEarly = filteredHistory.filter(h => h.status === 'left').length;
            
            // Calculate average wait time (rounded to nearest minute)
            const avgWait = filteredHistory.length > 0
                ? Math.round(filteredHistory.reduce((sum, h) => sum + (h.waitTimeMinutes || 0), 0) / filteredHistory.length)
                : 0;

            // Update DOM elements with calculated values
            document.getElementById('total-visits').textContent = totalVisits;
            document.getElementById('avg-wait').textContent = avgWait;
            document.getElementById('completed-visits').textContent = completedVisits;
            document.getElementById('left-early').textContent = leftEarly;
        }
    </script>
</body>
</html>
