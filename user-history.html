<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QueueSmart Tutor - My History</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* Stats cards grid layout */
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* individual stat card style */
        .stat-card {
            background: linear-gradient(135deg, var(--color-primary) 0%, #f8fafc 100%);
            padding: 1.5rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease; 
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        /* large number display */
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
            line-height: 1.2; 
        }

        /* label below the number */
        .stat-label {
            color: var(--color-placeholder);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo">QueueSmart Tutor</div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="join-queue.html" class="nav-link">Join Queue</a>
            <a href="queue-status.html" class="nav-link">My Queue</a>
            <a href="user-history.html" class="nav-link" style="color: var(--color-accent); font-weight: 700;">History</a>            
        </nav>
        <div class="user-section">
            <span id="user-email"></span>
            <span id="role-badge" class="role-badge"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <div class="container-full">
        <h1>My Queue History</h1>
        <!-- Total visits card -->
        <div class="stat-card">
            <div class="stat-value" id="total-visits">0</div>
            <div class="stat-label">Total Visits</div>
        </div>

        <!-- Average wait time card -->
        <div class="stat-card">
            <div class="stat-value" id="avg-wait">0</div>
            <div class="stat-label">Avg. Wait (min)</div>
        </div>

        <!-- Completed visits card -->
         <div class="stat-card">
            <div class="stat-value" id="completed-visits">0</div>
            <div class="stat-label">Completed</div>
         </div>

         <!-- Left early card -->
          <div class="stat-card">
            <div class="stat-value" id="left-early">0</div>
            <div class="stat-label">Left Early</div>
          </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Basic authentication check
        document.addEventListener('DOMContentLoaded', function() {
            // Verify user is logged in, redirect to login if not
            const user = checkAuth();
            if (!user) return;

            // Display user information in header
            document.getElementById('user-email').textContent = user.email;

            // Set role badge with appropriate styling
            const badge = document.getElementById('role-badge');
            badge.textContent = user.role === 'admin' ? 'ADMIN' : 'STUDENT';
            badge.className = `role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}`;
        });
    </script>
</body>
</html>
