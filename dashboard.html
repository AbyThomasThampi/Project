<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QueueSmart Tutor – Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="logo">QueueSmart Tutor</div>
    <nav class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="join-queue.html" class="nav-link">Join Queue</a>
      <a href="queue-status.html" class="nav-link">My Queue</a>
    </nav>
    <div class="user-section">
      <span id="user-email" style="font-weight:500"></span>
      <span id="role-badge" class="role-badge"></span>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </header>

  <div class="container-full">
    <h1>Welcome back, <span id="greeting-name"></span>!</h1>

    <!-- Current Queue Summary -->
    <div class="card">
      <div class="card-title">Your Current Queue Status</div>
      <div id="current-queue-summary" class="stats-grid"></div>
    </div>

    <!-- Active Services -->
    <div class="card">
      <div class="card-title">
        Available Services
        <a href="join-queue.html" style="font-size:0.95rem;color:var(--color-accent)">View all →</a>
      </div>
      <div id="services-grid" class="stats-grid"></div>
    </div>

    <!-- Notifications -->
    <div class="card">
      <div class="card-title">Recent Notifications</div>
      <div id="notifications-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () 
{
    const user = checkAuth();
    if (!user) return;

    document.getElementById('user-email').textContent = user.email;
    const badge = document.getElementById('role-badge');
    badge.textContent = user.role === 'admin' ? 'ADMIN' : 'STUDENT';
    badge.className = `role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}`;
    document.getElementById('greeting-name').textContent = user.email.split('@')[0];

    // Render current queues
    function renderCurrentQueues() {
      const container = document.getElementById('current-queue-summary');
      container.innerHTML = '';
      let hasAny = false;

      services.forEach(service => {
        const q = getQueue(service.id);
        const myEntry = q.find(entry => entry.email === user.email);
        if (myEntry) {
          hasAny = true;
          const pos = q.indexOf(myEntry) + 1;
          const wait = calculateWait(service.id, pos);

          const div = document.createElement('div');
          div.className = 'stat-item';
          div.innerHTML = `
            <div class="stat-number">${pos}</div>
            <div style="font-size:0.95rem;margin:8px 0">${service.name}</div>
            <div style="font-size:0.85rem;color:#6b7280">${wait} min wait</div>
            <a href="queue-status.html" style="margin-top:12px;display:inline-block;color:var(--color-accent);font-size:0.9rem">View details →</a>
          `;
          container.appendChild(div);
        }
      });

      if (!hasAny) {
        container.innerHTML = `<div class="stat-item" style="grid-column:1/-1;padding:3rem;text-align:center;color:#6b7280">You are not in any queue yet.<br><br><a href="join-queue.html" style="color:var(--color-accent)">Join a queue now →</a></div>`;
      }
    }

    // Render services cards
    function renderServices() {
      const container = document.getElementById('services-grid');
      container.innerHTML = '';
      services.forEach(s => {
        const qLen = getQueue(s.id).length;
        const card = document.createElement('div');
        card.className = 'service-card card';
        card.innerHTML = `
          <h3>${s.name}</h3>
          <p style="color:#6b7280;margin:8px 0 16px">${s.description}</p>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <small>Est. ${s.expectedDuration} min</small><br>
              <small style="color:#10b981">${qLen} in queue</small>
            </div>
            <button onclick="location.href='join-queue.html'" class="btn-primary action-btn">Join</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Init page
    renderCurrentQueues();
    renderServices();
    renderNotifications();
});
  </script>
</body>
</html>
