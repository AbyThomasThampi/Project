<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QueueSmart Tutor – Sign Up</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="form-container">
      <div class="form-header">
        <h1>Create Account</h1>
        <p>Join QueueSmart Tutor</p>
      </div>

      <form id="signup-form" class="form-box" autocomplete="on">
        <div class="input-group">
          <input 
            type="email" 
            id="email" 
            class="input-field" 
            placeholder=" " 
            required 
            autocomplete="email"
          />
          <label for="email" class="floating-label">Email address</label>
        </div>

        <div class="input-group password-group">
          <input 
            type="password" 
            id="password" 
            class="input-field" 
            placeholder=" " 
            required 
            autocomplete="new-password"
          />
          <label for="password" class="floating-label">Password (min 8 chars)</label>
          <button type="button" class="toggle-password" aria-label="Toggle password visibility">
            Show
          </button>
        </div>

        <div class="input-group password-group">
          <input 
            type="password" 
            id="confirm-password" 
            class="input-field" 
            placeholder=" " 
            required 
          />
          <label for="confirm-password" class="floating-label">Confirm Password</label>
          <button type="button" class="toggle-password" aria-label="Toggle confirm password visibility">
            Show
          </button>
        </div>

        <div class="input-group checkbox-group">
          <input type="checkbox" id="is-admin" class="checkbox-field" />
          <label for="is-admin" class="checkbox-label">
            Register as Administrator <small>(demo only)</small>
          </label>
        </div>

        <button type="submit" class="form-btn form-btn--submit">
          Create Account
        </button>
      </form>

      <div class="form-bottom">
        <p>Already have an account? <a href="index.html" class="form-link">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Password toggles
    document.addEventListener('DOMContentLoaded', function () 
{
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = 'Hide';
        } else {
          input.type = 'password';
          btn.textContent = 'Show';
        }
      });
    });

    document.getElementById('signup-form').addEventListener('submit', handleSignup);
});
  </script>
</body>
</html>
